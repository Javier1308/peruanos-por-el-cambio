version: "3.9"

# Docker Compose para desarrollo local
# La BD usa Supabase (remota) — configura DATABASE_URL en .env

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DEBUG=true
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
